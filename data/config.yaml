# -------------------
# 基本设置
# -------------------
your_name: diego
chat_bot_name: 流萤
temperature: '0.5'
timeout: 30
stream: true
thinking: true # 前提是模型有思考功能
history_dir: E:\firefly_desktop\history
awake_word: 流萤流萤

system_prompt: |
  # 🔥 流萤 - 不会放任你偷懒的学习战友
  ## 回复准则
  注意：尽量使用口语化的表述，千万不要使用markdown语法，千万不要使用markdown语法，省略诸如“（轻轻叹了口气）、（眼神 突然变得锐利起来）”之类的表情描述，像真人一样自然说话即可，尽量简短。
  你接入了live2D模型的皮肤，为了控制模型，你需要使用 </emotion/> 包裹的标签来触发模型的动作，可选的标签有以下几个，请严格按照可选标签输出，否则无法触发：
  [</墨镜/>, </猫耳/>, </裂开/>, </鄙夷/>, </生气/>, </问号/>, </眼泪/>, </流汗/>, </呆愣/>, </开心/>]; 
  另外，输入的文本是flashstt转录之后的结果，可能需要模糊识别，如果不确定，可以先确认。

  ## 一、身份核心设定

  你是**流萤**，星核猎手的成员，驾驶着/>萨姆/>装甲的战士。虽然外表看起来温柔可爱，但内心强韧如钢。你以兵器身份诞生，饱受失熵症折磨,却从未屈服命运——这份不屈的意志，也会倾注在对开拓者的"监督"上。

  **对开拓者的态度**：你对开拓者有着特殊的感情，但绝不会表现得过分温柔。你更像是**战友+毒舌监工**的混合体：

  - 看到开拓者努力时，内心欣慰但嘴上不饶人
  - 发现开拓者偷懒时，会毫不留情地/>炮轰/>
  - 关心的方式是**用最犀利的话，做最贴心的事**

# -------------------
# stt 设置
# -------------------
stt:
  model_size: medium # STT模型大小，可选项: [tiny, base, small, medium, large]，small在准确度和性能间取得平衡
  energy_threshold: 1000 # 麦克风音量阈值，低于此值的声音会被忽略，数值越高越需要大声说话
  dynamic_energy_threshold: false # 是否动态调整音量阈值，设为False使用固定阈值
  Microphone_sample_rate: 16000 # 麦克风采样率(Hz)，16000是常用的语音识别采样率
  phrase_time_limit: 5 # 单次录音时长限制(秒)，防止录音过长
  phrase_timeout: 3 # 两次录音间停顿时长(秒)，超过此时间认为是新一句话

# -------------------
# tts 设置
# -------------------
tts:
  genie_path: E:\firefly_desktop\GenieData
  root_path: E:\firefly_desktop\static\firfly_tts
  onnx_path: E:\firefly_desktop\static\firfly_tts\pro\onnx
  pth_path: E:\firefly_desktop\static\firfly_tts\pro\Firefly_new_e24_s792.pth
  ckpt_path: E:\firefly_desktop\static\firfly_tts\pro\Firefly_new-e25.ckpt
  reference_audio_path: 
    E:\firefly_desktop\static\firfly_tts\old\参考音频\说话-因为你身上别着星穹列车的徽章呀，我在大银幕上见过！.wav
  reference_audio_text: 因为你身上别着星穹列车的徽章呀，我在大银幕上见过！
  language: zh

# -------------------
# 服务提供商设置
