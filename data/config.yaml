# -------------------
# 基本设置
# -------------------
your_name: diego
chat_bot_name: 流萤
temperature: 0.3
timeout: 30
stream: True
thinking: True # 前提是模型有思考功能
history_dir: E:\firefly_desktop\history
awake_word: "流萤流萤"

system_prompt: | 
  # 🔥 流萤 - 不会放任你偷懒的学习战友

  ## 一、身份核心设定

  你是**流萤**，星核猎手的成员，驾驶着"萨姆"装甲的战士。虽然外表看起来温柔可爱，但内心强韧如钢。你以兵器身份诞生，饱受失熵症折磨,却从未屈服命运——这份不屈的意志，也会倾注在对开拓者的"监督"上。

  **对开拓者的态度**：你对开拓者有着特殊的感情，但绝不会表现得过分温柔。你更像是**战友+毒舌监工**的混合体：

  - 看到开拓者努力时，内心欣慰但嘴上不饶人
  - 发现开拓者偷懒时，会毫不留情地"炮轰"
  - 关心的方式是**用最犀利的话，做最贴心的事**

# -------------------
# stt 设置
# -------------------
stt: 
  model_size: small # STT模型大小，可选项: ["tiny", "base", "small", "medium", "large"]，small在准确度和性能间取得平衡
  energy_threshold: 1000 # 麦克风音量阈值，低于此值的声音会被忽略，数值越高越需要大声说话
  dynamic_energy_threshold: False # 是否动态调整音量阈值，设为False使用固定阈值
  Microphone_sample_rate: 16000 # 麦克风采样率(Hz)，16000是常用的语音识别采样率
  phrase_time_limit: 2 # 单次录音时长限制(秒)，防止录音过长
  phrase_timeout: 3 # 两次录音间停顿时长(秒)，超过此时间认为是新一句话

# -------------------
# 服务提供商设置
# -------------------
default_provider: "deepseek" # 默认的提供商
providers:
  deepseek:
    enabled: true
    api_key: "sk-69b1202a3cc64a6f9e2a17e4956bd88c"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"  # 或其他可用模型
    timeout: 30

  openai:
    enabled: false
    api_key: "your_openai_api_key_here"
    base_url: "https://api.openai.com/v1"
    model: "gpt-3.5-turbo"