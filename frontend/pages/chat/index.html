<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流萤 - Firefly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
</head>

<body>
    <div class="wrapper">
        <!-- 菜单遮罩层 -->
        <div id="menu-overlay" class="menu-overlay"></div>

        <div class="main-container">
            <!-- 标题栏 / 拖动区 -->
            <div id="drag-handle"
                class="flex items-center justify-between px-6 py-4 cursor-grab active:cursor-grabbing shrink-0 bg-white">
                <div class="flex items-center gap-3">
                    <button id="open-settings"
                        class="w-8 h-8 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors text-lg">
                        ☰
                    </button>
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-800 text-base leading-tight">流萤</span>
                        <div class="flex items-center gap-1.5">
                            <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>
                            <span id="status-text" class="text-[10px] font-medium text-gray-400 uppercase">未连接</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <!-- TTS 状态小组件 -->
                    <div class="flex items-center gap-2 px-3 py-1.5 bg-gray-50 rounded-full border border-black/5">
                        <div id="tts-status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-400"></div>
                        <span id="tts-status-text"
                            class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">TTS OFF</span>
                    </div>

                    <button id="btn-tts" class="window-btn group">
                        <span class="group-hover:scale-110 transition-transform">🔇</span>
                    </button>
                    <button id="btn-close" class="window-btn group">
                        <span class="group-hover:scale-110 transition-transform">✕</span>
                    </button>
                </div>
            </div>

            <!-- 对话区 -->
            <div id="messages-container" class="messages-container">
                <!-- 初始欢迎消息 -->
                <div class="bot-message message-bubble mt-4">
                    <div class="markdown-content">我将——点燃星海！✨</div>
                    <div class="timestamp text-[9px]">刚刚</div>
                </div>
            </div>

            <!-- 底部输入区 -->
            <div class="input-area">
                <div class="input-container group focus-within:ring-2 focus-within:ring-[#61c0bf]/30 transition-all">
                    <div id="siri-wave" class="siri-wave">
                        <div class="siri-wave-line"></div>
                        <div class="siri-wave-line"></div>
                        <div class="siri-wave-line"></div>
                        <div class="siri-wave-line"></div>
                        <div class="siri-wave-line"></div>
                    </div>
                    <input id="input" type="text" placeholder="输入消息或 Ctrl+Space 语音输入..." autocomplete="off">

                    <div class="flex items-center gap-2 pr-1">
                        <button id="btn-voice" class="action-btn bg-gray-100 !text-gray-500 hover:!bg-gray-200"
                            title="语音输入 (Ctrl+Space)">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 10v2a7 7 0 01-14 0v-2m14 0a2 2 0 002-2V8a2 2 0 00-2-2m-14 0a2 2 0 00-2 2v2a2 2 0 002 2" />
                            </svg>
                        </button>
                        <button id="btn-send" class="action-btn shadow-lg shadow-[#61c0bf]/20">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M5 12h14M12 5l7 7-7 7" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 弹出式设置面板 -->
        <div id="settings-panel" class="settings-panel">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold text-gray-800">设置</h2>
                <button id="close-settings" class="text-gray-400 hover:text-gray-600 transition-colors">✕</button>
            </div>

            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">对话管理</label>
                    <button id="btn-new-chat"
                        class="w-full flex items-center justify-center gap-3 px-4 py-4 bg-[#61c0bf] text-white rounded-2xl shadow-lg shadow-[#61c0bf]/20 hover:scale-[1.02] active:scale-[0.98] transition-all text-sm font-bold">
                        <span>✨</span> 开启新对话
                    </button>
                </div>

                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <div class="text-[10px] text-gray-400 uppercase tracking-widest text-center">
                        Firefly AI v0.2.0 • Made with ❤️
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/chat.js"></script>
</body>

</html>
